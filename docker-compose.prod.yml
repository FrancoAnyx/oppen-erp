version: '3.9'

# ============================================================
# ERP Reseller B2B - Docker Compose PRODUCCIÓN
# Uso: docker compose -f docker-compose.prod.yml up -d
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ----------------------------------------------------------
  # BASE DE DATOS
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: erp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-erp_prod}
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-erp_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - erp-internal
    logging: *default-logging

  # ----------------------------------------------------------
  # REDIS (Bull queues + cache)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-internal
    logging: *default-logging

  # ----------------------------------------------------------
  # API (NestJS)
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    container_name: erp-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-erp_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-erp_prod}?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    volumes:
      - ./secrets:/run/secrets:ro
      - api_logs:/app/logs
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - erp-internal
    logging: *default-logging

  # ----------------------------------------------------------
  # WORKER (BullMQ - facturación ARCA + tareas async)
  # ----------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: runner
    container_name: erp-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.production
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-erp_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-erp_prod}?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    volumes:
      - ./secrets:/run/secrets:ro
      - worker_logs:/app/logs
    networks:
      - erp-internal
    logging: *default-logging

  # ----------------------------------------------------------
  # FRONTEND (Next.js)
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    container_name: erp-web
    restart: unless-stopped
    env_file: .env.production
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.tu-dominio.com/api/v1}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - erp-internal
    logging: *default-logging

  # ----------------------------------------------------------
  # NGINX (reverse proxy + SSL termination)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - erp-internal
    logging: *default-logging

  # ----------------------------------------------------------
  # BACKUP AUTOMÁTICO (corre diariamente)
  # ----------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: erp-backup
    restart: "no"
    depends_on:
      - db
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    networks:
      - erp-internal

networks:
  erp-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  worker_logs:
    driver: local
  nginx_logs:
    driver: local
